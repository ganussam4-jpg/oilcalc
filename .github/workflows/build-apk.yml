name: Build OILCALC APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses-dev libncursesw5-dev libtinfo6 \
            cmake libffi-dev libssl-dev build-essential \
            libsqlite3-dev libbz2-dev liblzma-dev

      - name: Install buildozer and cython
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install buildozer==1.5.0
          pip install cython==0.29.36

      - name: Install Android cmdline-tools
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools $HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest

      - name: Pre-accept Android SDK licenses
        run: |
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "build-tools;33.0.2" \
            "platforms;android-33" > /dev/null 2>&1 || true

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-v3
          restore-keys: |
            buildozer-

      - name: Build APK with Buildozer
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          buildozer android debug

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find bin -name "*.apk" 2>/dev/null | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            find . -name "*.apk" 2>/dev/null
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: oilcalc-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
