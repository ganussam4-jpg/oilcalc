name: Build OILCALC APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK inside official Kivy Docker image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            ghcr.io/kivy/buildozer:latest \
            android debug

      - name: Restore permissions
        if: always()
        run: |
          sudo chown -R $(id -u):$(id -g) . || true

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*.apk" 2>/dev/null | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            find . -name "*.apk" 2>/dev/null
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: oilcalc-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30
