name: Build APK for Android (Docker)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer in Docker
        run: |
          docker run --rm \
            -v $(pwd):/home/user/app \
            -w /home/user/app \
            ghcr.io/kivy/buildozer:latest \
            buildozer android debug
