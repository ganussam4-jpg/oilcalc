name: Build APK for Android

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses6 libtinfo6 cmake libffi-dev libssl-dev build-essential

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Setup Android SDK Properly
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 17.0

      - name: Accept Licenses
        run: |
          yes | sdkmanager --licenses
          sdkmanager "build-tools;37.0.0" "platform-tools"

      - name: Build APK
        run: buildozer -v android debug
